<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CleanHike Nepal — Preserve Nepal's Trails</title>

    <meta property="og:title" content="CleanHike Nepal" />
    <meta property="og:description" content="Join our community clean hikes and help preserve Nepal's beautiful Himalayan trails." />
    <meta name="twitter:card" content="summary_large_image" />
    <!-- No-flicker theme script: applies dark/light class before first paint -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme = stored === 'dark' || stored === 'light'
            ? stored
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.classList.add(theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
